<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Display Fixed</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
}

/* Main Website Content */
.main-content {
    padding: 20px;
}

/* Floating Mini Display */
.mini-display {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 260px;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    padding: 15px;
    text-align: center;
    border: 1px solid #ddd;
    z-index: 9999;
}

.mini-display h3 {
    margin-top: 0;
    color: #333;
}

.mini-display p {
    color: #666;
    font-size: 13px;
}

/* Buttons */
.btn-container {
    margin-top: 15px;
    display: flex;
    justify-content: space-between;
}

.btn {
    text-decoration: none;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    border: none;
}

/* Website Button */
.website-btn {
    background-color: #007bff;
    color: white;
}

/* Close Button */
.close-btn {
    background-color: #dc3545;
    color: white;
}

/* Status */
#status {
    margin-top: 6px;
    font-size: 12px;
    color: green;
}
</style>

</head>
<body>

<!-- Main Website -->
<div class="main-content">
    <h2>Welcome to My Website</h2>
    <button onclick="loadSite()">Open Website</button>

    <div id="siteArea"></div>
</div>

<!-- Floating Mini Display -->
<div id="myMiniDisplay" class="mini-display">
    <h3>নোটিফিকেশন</h3>
    <p>ওয়েবসাইটে গেলেও এই বক্স থাকবে ✅</p>

    <div class="btn-container">
        <a href="https://google.com" target="_blank" class="btn website-btn">ওয়েবসাইট</a>
        <button id="closeBtn" class="btn close-btn">বন্ধ</button>
    </div>

    <div id="status">Active</div>
</div>

<script>
const miniDisplay = document.getElementById('myMiniDisplay');
const closeBtn = document.getElementById('closeBtn');

/* Load Website Content without removing UI */
function loadSite() {
    document.getElementById("siteArea").innerHTML = `
        <h3>Website Loaded ✅</h3>
        <p>এখানে তোমার ওয়েবসাইটের কনটেন্ট দেখাবে</p>
    `;
}

/* Close শুধুমাত্র এই বাটনে */
closeBtn.addEventListener('click', function() {
    miniDisplay.style.display = 'none';
});
</script>

</body>
</html>
