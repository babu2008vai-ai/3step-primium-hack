<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Display Popup</title>
    <style>
        /* মূল পেজের ডিজাইন */
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* ছোট ডিসপ্লে (Popup) এর ডিজাইন */
        .mini-display {
            width: 300px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            padding: 20px;
            text-align: center;
            border: 1px solid #ddd;
        }

        .mini-display h3 {
            margin-top: 0;
            color: #333;
        }

        .mini-display p {
            color: #666;
            font-size: 14px;
        }

        /* বাটনের ডিজাইন */
        .btn-container {
            margin-top: 20px;
            display: flex;
            justify-content: space-around;
        }

        .btn {
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        /* ওয়েবসাইট বাটন */
        .website-btn {
            background-color: #007bff;
            color: white;
        }

        .website-btn:hover {
            background-color: #0056b3;
        }

        /* বন্ধ করার বাটন */
        .close-btn {
            background-color: #dc3545;
            color: white;
            border: none;
        }

        .close-btn:hover {
            background-color: #bd2130;
        }
    </style>
</head>
<body>

    <div id="myMiniDisplay" class="mini-display">
        <h3>আমাদের নোটিফিকেশন</h3>
        <p>নিচের বাটনে ক্লিক করে আমাদের ওয়েবসাইট ভিজিট করুন। এই ডিসপ্লেটি বন্ধ হবে না।</p>
        
        <div class="btn-container">
            <a href="https://deshclub2.com/#/register?invitationCode=17512140663" target="_blank" id="websiteBtn" class="btn website-btn">ওয়েবসাইট</a>
            
            <button id="closeBtn" class="btn close-btn">বন্ধ করুন</button>
        </div>
    </div>

    <script>
        const miniDisplay = document.getElementById('myMiniDisplay');
        const websiteBtn = document.getElementById('websiteBtn');
        const closeBtn = document.getElementById('closeBtn');

        // ওয়েবসাইট বাটনে ক্লিক করলে যা হবে
        websiteBtn.addEventListener('click', function(event) {
            // ১. এটি ডিসপ্লেটিকে স্ক্রিনে জোর করে ধরে রাখবে
            miniDisplay.style.display = 'block'; 
            
            // ২. অন্য কোনো কোডের কারণে যাতে বন্ধ না হয় তা নিশ্চিত করবে
            event.stopPropagation();
        });

        // শুধু 'বন্ধ করুন' বাটনে ক্লিক করলেই ডিসপ্লেটি হারাবে
        closeBtn.addEventListener('click', function() {
            miniDisplay.style.display = 'none';
        });
    </script>

</body>
</html>
