<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEHEDI BOSS AI SYSTEM PRO</title>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#000814,#001d3d,#000);
    color:white;
}

/* LOGIN */
#loginBox{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:15px;
}

#mainTitle{
    font-size:28px;
    font-weight:900;
    text-transform:uppercase;
    background:linear-gradient(90deg,#00d4ff,#ffd60a,#ff4d6d,#00ff88);
    background-size:300% 300%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:titleMove 4s linear infinite;
    text-align:center;
}

@keyframes titleMove{
    0%{background-position:0% 50%}
    100%{background-position:100% 50%}
}

input{
    width:80%;
    max-width:320px;
    padding:15px;
    border:none;
    border-radius:12px;
    text-align:center;
}

button{
    width:80%;
    max-width:320px;
    padding:15px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
    background:linear-gradient(90deg,#00b4d8,#0077b6);
    color:white;
}

#message{
    color:#ff4d6d;
    text-align:center;
}

/* APP */
#app{
    display:none;
    min-height:100vh;
    text-align:center;
    padding:20px;
}

/* BIG SMALL */
#result{
    font-size:120px;
    font-weight:bold;
    margin-top:40px;

    background:linear-gradient(90deg,#00d4ff,#ffd60a,#ff006e,#00ff88);
    background-size:300% 300%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation:float 1s infinite alternate, colorMove 3s linear infinite;
}

@keyframes float{
    from{transform:scale(0.95)}
    to{transform:scale(1.05)}
}

@keyframes colorMove{
    0%{background-position:0% 50%}
    100%{background-position:100% 50%}
}

/* TIMER */
#timer{
    font-size:50px;
    color:#ffd60a;
}

/* CONTACT BOX */
#contactBox{
    margin-top:40px;
    padding:20px;
    border:1px solid #00b4d8;
    border-radius:12px;
    display:inline-block;
    cursor:pointer;
    color:#00b4d8;
    font-weight:bold;
}

/* TAB */
.tabs{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    display:flex;
}

.tabs button{
    flex:1;
    padding:18px;
    border:none;
    font-size:16px;
}

#aiBtn{background:#0077b6;color:white;}
#gameBtn{background:#ffd60a;color:black;}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">

    <div id="mainTitle">MEHEDI BOSS AI SYSTEM PRO</div>

    <input id="password" type="password" placeholder="Enter Password">

    <button onclick="login()">LOGIN</button>

    <div id="message"></div>

</div>

<!-- APP -->
<div id="app">

    <div id="result">---</div>
    <div id="timer">30</div>

    <p>REAL TIME AI SIMULATION</p>

    <!-- CLICKABLE CONTACT -->
    <div id="contactBox" onclick="openTelegram()">
        CONTACT DEVELOPER (CLICK HERE)
    </div>

    <div class="tabs">
        <button id="aiBtn" onclick="openAI()">AI</button>
        <button id="gameBtn" onclick="openGame()">GAME</button>
    </div>

</div>

<script>

const PASSWORD = "MEHEDIVAI115";
let countdown = 30;
let started = false;

/* LOGIN */
function login(){

    let pass = document.getElementById("password").value;
    let msg = document.getElementById("message");

    if(pass === PASSWORD){

        msg.style.color="#00ff88";
        msg.innerText="LOGIN SUCCESS";

        document.getElementById("loginBox").style.display="none";
        document.getElementById("app").style.display="block";

        if(!started){
            started=true;
            startSystem();
        }

    }else{

        msg.style.color="#ff4d6d";
        msg.innerText="ভুল পাসওয়ার্ড! আবার চেষ্টা করুন";
    }
}

/* RANDOM BIG SMALL */
function randomResult(){
    return Math.random()<0.5?"BIG":"SMALL";
}

/* SYSTEM */
function startSystem(){

    document.getElementById("result").innerText=randomResult();

    setInterval(()=>{

        countdown--;

        document.getElementById("timer").innerText=countdown;

        if(countdown<=0){
            countdown=30;
            document.getElementById("result").innerText=randomResult();
        }

    },1000);
}

/* AI */
function openAI(){
    window.scrollTo({top:0,behavior:"smooth"});
}

/* GAME */
function openGame(){
    window.open("https://hgnice.bet/#/register?invitationCode=531211974484","_blank");
}

/* TELEGRAM */
function openTelegram(){
    window.open("https://t.me/MEHEDIVA999","_blank");
}

</script>

</body>
  </html>
