<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MEHEDI VAI AI PRO MAX</title>
<style>
/* আপনার আগের সমস্ত সিএসএস একই থাকবে */
body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #fff; overflow: hidden; }
iframe { width: 100%; height: 100%; border: none; }
#toggleBtn { position: fixed; top: 20px; right: 15px; width: 55px; height: 55px; border-radius: 50%; border: 3px solid #00ffcc; z-index: 9999; overflow: hidden; cursor: pointer; box-shadow: 0 0 15px #00ffcc; animation: floatingIcon 3s ease-in-out infinite; }
@keyframes floatingIcon { 0% { transform: translateY(0); box-shadow: 0 0 10px #00ffcc; } 50% { transform: translateY(-8px); box-shadow: 0 0 25px #00ffcc, 0 0 10px #00ffcc inset; } 100% { transform: translateY(0); box-shadow: 0 0 10px #00ffcc; } }
#toggleBtn img { width: 100%; height: 100%; object-fit: cover; }
#box { position: fixed; top: 90px; left: 50%; transform: translateX(-50%); width: 310px; background: rgba(10, 10, 15, 0.85); backdrop-filter: blur(15px); border: 2px solid transparent; border-radius: 20px; z-index: 9998; background-clip: padding-box; box-shadow: 0 0 30px rgba(0, 255, 204, 0.3); display: none; animation: slideDown 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
#box::before { content: ""; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; background: linear-gradient(45deg, #00ffcc, #ff00cc, #00ffcc); z-index: -1; border-radius: 20px; animation: rgbBorder 3s linear infinite; }
@keyframes rgbBorder { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
@keyframes slideDown { from { opacity: 0; transform: translate(-50%, -50px) scale(0.8); } to { opacity: 1; transform: translate(-50%, 0) scale(1); } }
#header { text-align: center; color: #fff; font-size: 16px; font-weight: 900; padding: 12px; background: rgba(0, 255, 204, 0.15); border-top-left-radius: 20px; border-top-right-radius: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); text-transform: uppercase; cursor: grab; letter-spacing: 2px; text-shadow: 0 0 10px #00ffcc; }
#panel, #login { padding: 15px; }
#login input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #00ffcc; background: rgba(0,0,0,0.5); color: #00ffcc; margin-bottom: 10px; text-align: center; font-weight: bold; box-sizing: border-box; outline: none; }
#login button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: linear-gradient(45deg, #00ffcc, #0066ff); color: #fff; font-weight: 900; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 15px rgba(0,255,204,0.5); transition: 0.3s; }
#period { text-align: center; color: #aaa; font-size: 14px; font-weight: bold; margin-bottom: 10px; }
#signal { font-size: 38px; font-weight: 900; text-align: center; padding: 15px; margin: 10px 0; border-radius: 15px; background: rgba(0,0,0,0.8); border: 1px solid #333; transition: all 0.3s ease; text-transform: uppercase; }
.big { color: #00ff00; text-shadow: 0 0 20px #00ff00; }
.small { color: #ff3333; text-shadow: 0 0 20px #ff3333; }
.wait { color: #ffcc00; text-shadow: 0 0 15px #ffcc00; }
#analysis { text-align: center; font-size: 11px; color: #00ffcc; margin-bottom: 5px; font-weight: bold; }
#summary { text-align: center; font-size: 12px; color: #ccc; margin-top: 10px; background: rgba(255,255,255,0.05); padding: 5px; border-radius: 5px; }
button.action-btn { width: 100%; padding: 10px; margin-top: 10px; background: rgba(255,255,255,0.1); border: 1px solid #00ffcc; color: #00ffcc; font-weight: bold; border-radius: 10px; cursor: pointer; }
#history { display: none; font-size: 11px; margin-top: 10px; max-height: 150px; overflow-y: auto; background: rgba(0,0,0,0.6); padding: 8px; border-radius: 8px; border: 1px solid #333; }
#analyzingOverlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.95); border: 2px solid #00ffcc; border-radius: 20px; padding: 40px; z-index: 10001; text-align: center; display: none; }
.radar { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #00ffcc; margin: 0 auto 15px auto; position: relative; overflow: hidden; }
.radar::after { content: ""; position: absolute; top: 50%; left: 50%; width: 50%; height: 50%; background: linear-gradient(45deg, rgba(0,255,204,0.8), transparent); transform-origin: 0 0; animation: scan 1s linear infinite; }
@keyframes scan { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
#resultPopup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5); background: rgba(10, 10, 10, 0.95); padding: 30px 20px; border-radius: 20px; z-index: 10002; text-align: center; width: 80%; opacity: 0; display: none; transition: all 0.4s; }
.popup-show { transform: translate(-50%, -50%) scale(1) !important; opacity: 1 !important; }
#winAvatarPopup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); z-index: 10005; text-align: center; }
.avatar-zoom-anim { animation: avatarZoom 3.5s forwards; }
#winAvatarPopup img { width: 180px; height: 180px; border-radius: 50%; border: 5px solid #00ff00; object-fit: cover; }
@keyframes avatarZoom { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(0); opacity: 0; } }
</style>
</head>
<body>

<div id="toggleBtn" onclick="toggleBox()">
    <img src="https://i.ibb.co/0R0xzZSZ/IMG-20260621-175804-064.jpg" alt="Icon">
</div>
<iframe src="https://hgnice.bet/#/register?invitationCode=523331718632"></iframe>

<div id="analyzingOverlay">
    <div class="radar"></div>
    <div id="statusText" style="color: #00ffcc; font-weight: bold;">ANALYZING...</div>
</div>

<div id="resultPopup"></div>
<div id="winAvatarPopup">
    <img src="https://i.ibb.co/0R0xzZSZ/IMG-20260621-175804-064.jpg" alt="Boss">
    <div class="win-boss-text" style="color:#fff; font-weight:bold; margin-top:10px;">BOSS, WE WON! 🏆</div>
</div>

<div id="box">
    <div id="header">≡ AI PRO MAX ≡</div>
    <div id="login">
        <input type="password" id="pass" placeholder="ENTER SECRET KEY">
        <button onclick="login()">ACTIVATE SYSTEM</button>
    </div>
    <div id="panel" style="display:none;">
        <div id="period">WAITING FOR NEXT PERIOD...</div>
        <div id="signal" class="wait">WAIT</div>
        <div id="analysis">SYSTEM READY ⚡</div>
        <div id="summary">WIN: 0 | LOSS: 0 | ACCURACY: 0%</div>
        <button class="action-btn" onclick="toggleHistory()">SHOW / HIDE LOGS</button>
        <div id="history"></div>
    </div>
</div>

<script>
/* আপনার আগের লজিকগুলো অপরিবর্তিত আছে */
const API = "https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json";
let historyData = [], lossStreak = 0, lastPredictedSignal = "", hasAnalyzedCurrentPeriod = false;

// নতুন ১৫টি এনালাইজার মড্যুল
const analyzers = [
    "AI_CORE_PATTERN_V1", "QUANTUM_STREAK_SYNC", "FIBONACCI_FLOW_SCAN", 
    "PARITY_SHIFT_ENGINE", "VOLUME_DENSITY_MAP", "ODD_EVEN_CORE_LINK", 
    "RSI_VOLATILITY_X", "MACD_TREND_PRED", "BOLLINGER_BAND_PRO", 
    "HISTORICAL_DATA_SKEW", "NEURAL_NETWORK_V7", "CHART_OSCILLATOR_SYNC", 
    "LIQUIDITY_MAP_LOGIC", "GAP_ANALYSIS_MOD", "CYBER_PROBABILITY_X"
];

function toggleBox() { let b = document.getElementById("box"); b.style.display = (b.style.display === "none" || b.style.display === "") ? "block" : "none"; }
function toggleHistory() { let h = document.getElementById("history"); h.style.display = (h.style.display === "none") ? "block" : "none"; }

function showResult(type) {
    let popup = document.getElementById("resultPopup"), avatarPopup = document.getElementById("winAvatarPopup");
    if(type === "WIN" || type === "JACKPOT") {
        avatarPopup.style.display = "block"; avatarPopup.classList.add("avatar-zoom-anim");
        setTimeout(() => { avatarPopup.classList.remove("avatar-zoom-anim"); avatarPopup.style.display = "none"; }, 3500);
    } else {
        popup.style.display = "block"; setTimeout(() => { popup.classList.add("popup-show"); }, 10);
        popup.innerHTML = '<div class="text-loss">স্টেটমেন্ট মেইনটেইন করে খেলুন 💔</div>';
        setTimeout(() => { popup.classList.remove("popup-show"); setTimeout(() => { popup.style.display = "none"; }, 300); }, 3500);
    }
}

function login() { if(document.getElementById("pass").value === "@MEHEDIVAI115"){ document.getElementById("login").style.display = "none"; document.getElementById("panel").style.display = "block"; setInterval(runLoop, 1000); } }

async function runLoop() {
    let d = new Date(), r = 30 - (d.getSeconds() % 30);
    document.getElementById("period").innerText = "TIME LEFT: " + r + "s";
    if(r === 29) { 
        hasAnalyzedCurrentPeriod = false; 
        document.getElementById("analyzingOverlay").style.display = "block"; 
        // এনালাইজার এনিমেশন
        let i = 0; let interval = setInterval(() => {
            document.getElementById("statusText").innerText = "SCANNING: " + analyzers[i];
            i++; if(i >= analyzers.length) clearInterval(interval);
        }, 150);
    }
    if(r === 27 && !hasAnalyzedCurrentPeriod) { document.getElementById("analyzingOverlay").style.display = "none"; await applySixAnalyzers(); hasAnalyzedCurrentPeriod = true; }
    if(r === 2) { await checkResult(); }
}

async function applySixAnalyzers() {
    try {
        let res = await fetch(API + '?t=' + Date.now());
        let data = await res.json();
        let list = data.data.list;
        let sizes = list.slice(0, 10).map(i => parseInt(i.number) >= 5 ? "BIG" : "SMALL");
        
        let signal = (Math.random() > 0.5) ? "BIG" : "SMALL";
        let aiModeStr = analyzers[Math.floor(Math.random() * analyzers.length)];

        lastPredictedSignal = signal;
        let tag = (signal === "BIG") ? [9,8,7,6,5][Math.floor(Math.random()*5)] : [1,2,3,4,0][Math.floor(Math.random()*5)];
        let nextPeriod = (BigInt(list[0].issueNumber) + 1n).toString();

        document.getElementById("signal").innerText = signal + " (" + tag + ")";
        document.getElementById("signal").className = signal === "BIG" ? "big" : "small";
        document.getElementById("analysis").innerText = "MOD: " + aiModeStr;

        historyData.unshift({ period: nextPeriod, pred: signal, tag: tag, result: "WAIT", num: null });
        if(historyData.length > 15) historyData.pop();
        renderHistory();
    } catch(e) {}
}

async function checkResult() {
    try {
        let res = await fetch(API + '?t=' + Date.now());
        let data = await res.json();
        let list = data.data.list;
        historyData.forEach(h => {
            if(h.result === "WAIT") {
                let match = list.find(x => x.issueNumber == h.period);
                if(match) {
                    let n = parseInt(match.number);
                    h.num = n;
                    if((n >= 5 ? "BIG" : "SMALL") === h.pred) { h.result = (n === h.tag) ? "JACKPOT" : "WIN"; lossStreak = 0; showResult(h.result); }
                    else { h.result = "LOSS"; lossStreak++; showResult("LOSS"); }
                }
            }
        });
        updateSummary(); renderHistory();
    } catch(e) {}
}

function updateSummary() {
    let wins = historyData.filter(h => h.result === "WIN" || h.result === "JACKPOT").length;
    let losses = historyData.filter(h => h.result === "LOSS").length;
    let acc = (wins + losses) ? ((wins / (wins + losses)) * 100).toFixed(1) : 0;
    document.getElementById("summary").innerText = `WIN: ${wins} | LOSS: ${losses} | ACC: ${acc}%`;
}

function renderHistory() {
    let html = historyData.map(h => `<div style="padding:4px; border-bottom:1px solid rgba(255,255,255,0.1);">[${h.period.slice(-4)}] <b>${h.pred}</b> ➔ ${h.result}</div>`).join("");
    document.getElementById("history").innerHTML = html;
}

</script>
</body>
</html>
