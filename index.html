<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEHEDI VAI AI SYSTEM</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:url('https://cloudinary-marketing-res.cloudinary.com/image/upload/ar_0.5,c_fill,g_auto,w_433/q_auto/f_auto/hiking_dog_mountain.jpg') center/cover no-repeat;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    width:340px;
    background:rgba(0,0,0,0.85);
    padding:20px;
    border-radius:15px;
    color:white;
    text-align:center;
}

h1{
    color:#00ff88;
    font-size:20px;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
    border:none;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.login-btn{
    background:#00c853;
    color:white;
}

#error{color:red;margin-top:5px}

#dashboard{display:none}

/* DISPLAY BOX */
.display{
    margin-top:10px;
    padding:15px;
    border:1px solid #00ff88;
    border-radius:10px;
    font-size:22px;
}

/* TIMER */
.timer{
    margin-top:8px;
    color:yellow;
}

/* FLOAT BUTTON */
.float-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#2196f3;
    color:white;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    user-select:none;
}

/* HISTORY */
.history{
    margin-top:10px;
    max-height:120px;
    overflow:auto;
    background:#111;
    padding:8px;
    border-radius:8px;
    font-size:12px;
    text-align:left;
}
</style>
</head>

<body>

<div class="box">

<div id="loginPage">
    <h1>MEHEDI VAI AI SYSTEM</h1>

    <input type="password" id="password" placeholder="Enter Password">

    <button class="login-btn" onclick="login()">LOGIN</button>

    <div id="error"></div>
</div>

<div id="dashboard">

    <h1>MEHEDI VAI AI SYSTEM</h1>

    <div class="timer">
        Timer: <span id="count">30</span>s
    </div>

    <div class="display" id="output">
        B / 0
    </div>

    <div class="history" id="history"></div>

</div>

</div>

<div class="float-btn" onclick="openSite()">
OPEN WEBSITE
</div>

<script>

let time = 30;
let locked = true;

let history = document.getElementById("history");

/* LOGIN */
function login(){

    let pass = document.getElementById("password").value;

    if(pass==="mehedi11"){
        document.getElementById("loginPage").style.display="none";
        document.getElementById("dashboard").style.display="block";

        startSystem();

    }else{
        document.getElementById("error").innerText="Wrong Password!";
    }
}

/* OPEN SITE */
function openSite(){
    window.open('https://hgnice.bet/#/register?invitationCode=531211974484','_blank');
}

/* MAIN SYSTEM */
function startSystem(){

    setInterval(timer,1000);
    setInterval(generator,2000);
}

/* TIMER 30 -> 0 */
function timer(){

    time--;

    if(time <= 0){
        time = 30;
        locked = false; // unlock after 30 sec
    }

    document.getElementById("count").innerText = time;
}

/* BIG SMALL LOGIC */
function generator(){

    let num = Math.floor(Math.random()*10);

    let bs = locked ? "LOCK" : (num >= 5 ? "B" : "S");

    document.getElementById("output").innerText =
    bs + " / " + num;

    let div = document.createElement("div");
    div.innerText = bs + " / " + num;

    history.prepend(div);
}

</script>

</body>
</html>
