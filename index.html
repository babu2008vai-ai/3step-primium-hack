<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEHEDI BOSS AI SYSTEM PRO</title>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    font-family:Arial;
    background: radial-gradient(circle at top,#001219,#000,#000814);
    color:white;
    overflow-x:hidden;
}

/* MATRIX STYLE BACKGROUND */
body::before{
    content:"";
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:linear-gradient(0deg,transparent,rgba(0,255,170,0.05),transparent);
    animation:scan 3s linear infinite;
    pointer-events:none;
}

@keyframes scan{
    0%{transform:translateY(-100%)}
    100%{transform:translateY(100%)}
}

/* LOGIN */
#loginBox{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:15px;
}

#mainTitle{
    font-size:30px;
    font-weight:900;
    text-transform:uppercase;
    background:linear-gradient(90deg,#00f5d4,#00bbf9,#fee440,#f15bb5,#00f5d4);
    background-size:400% 400%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:glowMove 3s linear infinite;
    text-align:center;
}

@keyframes glowMove{
    0%{background-position:0% 50%}
    100%{background-position:100% 50%}
}

input{
    width:80%;
    max-width:320px;
    padding:15px;
    border:none;
    border-radius:12px;
    text-align:center;
    outline:none;
}

button{
    width:80%;
    max-width:320px;
    padding:15px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
    background:linear-gradient(90deg,#00b4d8,#0077b6);
    color:white;
}

/* MESSAGE */
#message{
    text-align:center;
    font-weight:bold;
    animation:blink 1s infinite alternate;
}

@keyframes blink{
    from{opacity:0.5}
    to{opacity:1}
}

/* APP */
#app{
    display:none;
    text-align:center;
    padding:20px;
}

/* DEV TITLE BIG */
#devText{
    font-size:22px;
    font-weight:900;
    margin-top:10px;

    background:linear-gradient(90deg,#00f5d4,#00bbf9,#fee440,#f15bb5,#00f5d4);
    background-size:400% 400%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation:glowMove 2s linear infinite;
}

/* RESULT */
#result{
    font-size:130px;
    font-weight:900;
    margin-top:20px;

    background:linear-gradient(90deg,#00f5d4,#fee440,#f15bb5,#00bbf9,#00f5d4);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation:shake 0.8s infinite alternate, glowMove 3s linear infinite;
}

@keyframes shake{
    from{transform:scale(0.95) rotate(-1deg)}
    to{transform:scale(1.05) rotate(1deg)}
}

/* TIMER */
#timer{
    font-size:60px;
    color:#fee440;
    font-weight:900;
}

/* LIVE TEXT */
#liveText{
    font-size:16px;
    color:#00f5d4;
    letter-spacing:3px;
}

/* CONTACT */
#contactBox{
    margin-top:60px;
    padding:15px;
    border:1px solid #00f5d4;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    cursor:pointer;
    font-weight:bold;
    color:#00f5d4;
    transition:0.3s;
}

#contactBox:hover{
    transform:scale(1.08);
    box-shadow:0 0 25px #00f5d4;
}

#contactBox img{
    width:22px;
}

/* FOOTER REMOVED BUTTONS AREA FIX */
.footerText{
    margin-top:40px;
    color:#aaa;
    font-size:12px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">

    <div id="mainTitle">MEHEDI BOSS AI SYSTEM PRO</div>

    <input id="password" type="password" placeholder="Enter Password">

    <button onclick="login()">LOGIN</button>

    <div id="message"></div>

</div>

<!-- APP -->
<div id="app">

    <!-- BIG DEV TITLE WITH ICONS -->
    <div id="devText">🔥 MEHEDI VAI AI SYSTEM DEVELOPER 🔥</div>

    <div id="result">---</div>

    <div id="timer">30</div>

    <div id="liveText">⚡ REAL TIME LIVE ⚡</div>

    <!-- CONTACT -->
    <div id="contactBox" onclick="openTelegram()">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg">
        CONTACT WITH ADMIN
    </div>

</div>

<script>

const PASSWORD = "MEHEDIVAI115";
let countdown = 30;
let started = false;

/* LOGIN */
function login(){

    let pass = document.getElementById("password").value;
    let msg = document.getElementById("message");

    if(pass === PASSWORD){

        document.getElementById("loginBox").style.display="none";
        document.getElementById("app").style.display="block";

        if(!started){
            started=true;
            startSystem();
        }

    }else{

        msg.style.color="#ff4d6d";
        msg.innerText="❌ Wrong Password! Please get password from Mehedi Vai";
    }
}

/* RANDOM */
function randomResult(){
    return Math.random()<0.5?"BIG":"SMALL";
}

/* SYSTEM */
function startSystem(){

    document.getElementById("result").innerText=randomResult();

    setInterval(()=>{

        countdown--;

        document.getElementById("timer").innerText=countdown;

        if(countdown<=0){
            countdown=30;
            document.getElementById("result").innerText=randomResult();
        }

    },1000);
}

/* TELEGRAM */
function openTelegram(){
    window.open("https://t.me/MEHEDIVA999","_blank");
}

</script>

</body>
  </html>
