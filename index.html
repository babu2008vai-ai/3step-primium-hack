<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEHEDI VAI AI SYSTEM</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:url('https://cloudinary-marketing-res.cloudinary.com/image/upload/ar_0.5,c_fill,g_auto,w_433/q_auto/f_auto/hiking_dog_mountain.jpg') center/cover no-repeat;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* BOX */
.box{
    width:340px;
    background:rgba(0,0,0,0.85);
    padding:20px;
    border-radius:15px;
    color:white;
    text-align:center;
}

/* LOGIN */
input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:6px;
    margin-top:10px;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.login-btn{
    background:#00c853;
    color:white;
}

#error{color:red;margin-top:5px}

/* DASHBOARD */
#dashboard{display:none}

/* TOP BIG SMALL */
.bs{
    font-size:28px;
    font-weight:bold;
    margin-top:10px;
    color:#00ff88;
}

/* NUMBER */
.num{
    font-size:22px;
    margin-top:8px;
    padding:10px;
    border:1px solid #00ff88;
    border-radius:10px;
}

/* TIMER */
.timer{
    margin-top:8px;
    color:yellow;
}

/* HISTORY */
.history{
    margin-top:10px;
    max-height:120px;
    overflow:auto;
    background:#111;
    padding:8px;
    border-radius:8px;
    text-align:left;
    font-size:13px;
}

/* FLOAT BUTTON */
.float{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#2196f3;
    color:white;
    padding:10px;
    border-radius:10px;
    cursor:move;
    user-select:none;
}
</style>
</head>

<body>

<div class="box">

<!-- LOGIN -->
<div id="loginPage">
    <h1 style="color:#00ff88;">MEHEDI VAI AI SYSTEM</h1>

    <input type="password" id="password" placeholder="Enter Password">

    <button class="login-btn" onclick="login()">LOGIN</button>

    <div id="error"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

    <div class="timer">
        TIMER: <span id="time">30</span>s
    </div>

    <!-- BIG SMALL TOP -->
    <div class="bs" id="bs">B</div>

    <!-- NUMBER -->
    <div class="num" id="num">0</div>

    <!-- HISTORY -->
    <div class="history" id="history"></div>

</div>

</div>

<!-- FLOAT BUTTON -->
<div class="float" id="floatBtn" onclick="openSite()">
OPEN WEBSITE
</div>

<script>

let time = 30;
let locked = true;

let history = document.getElementById("history");

/* LOGIN */
function login(){

    let pass = document.getElementById("password").value;

    if(pass==="mehedi11"){
        document.getElementById("loginPage").style.display="none";
        document.getElementById("dashboard").style.display="block";

        startSystem();
    }else{
        document.getElementById("error").innerText="Wrong Password!";
    }
}

/* OPEN WEBSITE */
function openSite(){
    window.open('https://hgnice.bet/#/register?invitationCode=531211974484','_blank');
}

/* SYSTEM */
function startSystem(){
    setInterval(timer,1000);
    setInterval(generator,2000);
}

/* TIMER */
function timer(){

    time--;

    if(time<=0){
        time=30;
        locked=false;
    }

    document.getElementById("time").innerText=time;
}

/* RANDOM ENGINE */
function generator(){

    let num = Math.floor(Math.random()*10);

    let bs;

    if(locked){
        bs = "B"; // stable mode
    }else{
        bs = num >= 5 ? "B" : "S";
    }

    document.getElementById("bs").innerText = bs;
    document.getElementById("num").innerText = num;

    // HISTORY ONLY WIN / JACKPOT
    let result = Math.random() > 0.5 ? "WIN" : "JACKPOT";

    let div = document.createElement("div");
    div.innerText = result;

    history.prepend(div);
}

/* DRAG FLOAT */
let f = document.getElementById("floatBtn");
let drag=false;

f.addEventListener("mousedown",()=>drag=true);
document.addEventListener("mouseup",()=>drag=false);

document.addEventListener("mousemove",(e)=>{
    if(drag){
        f.style.left=e.pageX+"px";
        f.style.top=e.pageY+"px";
        f.style.position="absolute";
    }
});

</script>

</body>
</html>
